version: "2"

sql:
  - engine: "postgresql"
    queries: "db/queries"
    schema: "migrations"
    gen:
      go:
        package: "sqlc"
        out: "internal/db/sqlc"
        sql_package: "database/sql"
        emit_interface: true
        emit_pointers_for_null_types: true
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - column: "users.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "users.created_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "users.updated_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "refresh_tokens.id"
            go_type: "github.com/google/uuid.UUID"
          - column: "refresh_tokens.user_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "refresh_tokens.chain_id"
            go_type: "github.com/google/uuid.UUID"
          - column: "refresh_tokens.revoked_at"
            go_type:
              import: "time"
              type: "Time"
              pointer: true
          - column: "refresh_tokens.expires_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "refresh_tokens.created_at"
            go_type:
              import: "time"
              type: "Time"
          - column: "refresh_tokens.updated_at"
            go_type:
              import: "time"
              type: "Time"
