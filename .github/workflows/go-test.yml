name: Go-test
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: Build
        run: go build -v ./...

      - name: Test with race detector
        run: go test -race ./...

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1
