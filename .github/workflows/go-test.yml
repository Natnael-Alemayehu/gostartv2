name: CI
on: [push, pull_request]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: Build
        run: go build -v ./...

      - name: Test with race detector
        run: go test -race -count=1 ./...

      - name: Check go mod tidy
        run: |
          go mod tidy
          git diff --exit-code

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.1

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: Integration tests
        run: go test -tags=integration -race -count=1 ./internal/database ./internal/repositories ./internal/auth -v

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

  gosec:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.26.x'

      - name: Run gosec
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec ./...
